@if (isReady()) {
  <div class="admin-users">
    <div class="admin-users__toolbar">
      <h2 class="admin-users__title">{{ literals.usersTitle }}</h2>
      <app-button [label]="literals.newUser" icon="pi pi-plus" (clicked)="onEdit(null)" />
    </div>

    <p-table
      [value]="userRows()"
      [tableStyle]="{ 'min-width': '600px' }"
      class="p-datatable-striped"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>{{ literals.colEmail }}</th>
          <th>{{ literals.colName }}</th>
          <th>{{ literals.colRole }}</th>
          <th>{{ literals.colActions }}</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>{{ row.user.email }}</td>
          <td>{{ row.user.displayName ?? '—' }}</td>
          <td>
            <app-badge [label]="row.roleBadge.label" [severity]="row.roleBadge.severity" />
          </td>
          <td class="admin-users__actions">
            <app-button
              icon="pi pi-pencil"
              variant="ghost"
              [pTooltip]="literals.editUser"
              tooltipPosition="top"
              (clicked)="onEdit(row.user)"
            />
            <app-button
              icon="pi pi-trash"
              variant="danger"
              [pTooltip]="literals.deleteUser"
              tooltipPosition="top"
              (clicked)="onDelete(row.user)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
}

<app-admin-user-dialog
  [visible]="dialogVisible()"
  [user]="editingUser()"
  (saved)="onDialogSaved()"
  (closed)="onDialogClosed()"
/>
