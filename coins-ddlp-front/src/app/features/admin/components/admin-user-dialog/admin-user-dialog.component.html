<p-dialog
  [visible]="visible()"
  (onHide)="onHide()"
  [modal]="true"
  [header]="header()"
  [style]="{ width: '420px' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
>
  <div class="user-form">
    @if (!isEditMode()) {
      <app-text-input
        [label]="authLiterals.emailLabel"
        [value]="email()"
        type="email"
        [placeholder]="authLiterals.emailPlaceholder"
        autocomplete="off"
        (valueChange)="email.set($event)"
      />

      <app-text-input
        [label]="authLiterals.passwordLabel"
        [value]="password()"
        type="password"
        [placeholder]="authLiterals.passwordPlaceholder"
        autocomplete="new-password"
        (valueChange)="password.set($event)"
      />
    }

    <app-text-input
      [label]="literals.nameLabel"
      [value]="displayName()"
      type="text"
      [placeholder]="literals.namePlaceholder"
      autocomplete="off"
      (valueChange)="displayName.set($event)"
    />

    <app-select
      [label]="literals.roleLabel"
      [value]="role()"
      [options]="roleOptions"
      (valueChange)="role.set($any($event))"
    />

    @if (errorMessage()) {
      <p class="user-form__error">{{ errorMessage() }}</p>
    }

    <div class="user-form__actions">
      <app-button
        [label]="sharedLiterals.save"
        [loading]="loading()"
        [disabled]="!canSubmit()"
        (clicked)="onSubmit()"
      />
    </div>
  </div>
</p-dialog>
