<div class="add-euro">
  <div class="add-euro__card">
    <div class="add-euro__grid">
      <div class="add-euro__col">
        <app-select
          [label]="literals.labelCountry"
          [value]="country()"
          [options]="countryOptions()"
          [placeholder]="literals.placeholderCountry"
          (valueChange)="country.set($event)"
        />
        <app-select
          [label]="literals.labelFaceValue"
          [value]="faceValue()"
          [options]="faceValueOptions"
          [placeholder]="literals.placeholderFaceValue"
          (valueChange)="faceValue.set($event)"
        />
        <app-text-input
          [label]="literals.labelUds"
          [value]="uds().toString()"
          type="number"
          [min]="0"
          (valueChange)="uds.set(+$event)"
        />
        <app-select
          [label]="literals.labelMint"
          [value]="mint()"
          [options]="mintOptions"
          [placeholder]="literals.placeholderMint"
          [disabled]="!isMintRequired()"
          (valueChange)="mint.set($event)"
        />
        <app-toggle
          [label]="literals.labelCommemorative"
          [value]="commemorative()"
          (valueChange)="commemorative.set($event)"
        />
      </div>

      <div class="add-euro__col">
        <app-text-input
          [label]="literals.labelYear"
          [value]="year() > 0 ? year().toString() : ''"
          type="number"
          [min]="1900"
          [max]="2100"
          (valueChange)="year.set(+$event)"
        />
        <app-text-input
          [label]="literals.labelDescription"
          [value]="description()"
          (valueChange)="description.set($event)"
        />
        <app-select
          [label]="literals.labelConservation"
          [value]="conservation()"
          [options]="availableConservationOptions()"
          [placeholder]="literals.placeholderConservation"
          [disabled]="isConservationLocked()"
          (valueChange)="conservation.set($any($event))"
        />
        <app-text-input
          [label]="literals.labelIdNum"
          [value]="idNum()"
          (valueChange)="idNum.set($event)"
        />
        <app-toggle
          [label]="literals.labelCirculation"
          [value]="circulation()"
          (valueChange)="circulation.set($event)"
        />
      </div>
    </div>

    <app-textarea
      [label]="literals.labelObservations"
      [value]="observations()"
      [placeholder]="literals.observationsPlaceholder"
      (valueChange)="observations.set($event)"
    />

    @if (errorMessage()) {
      <p class="add-euro__error">{{ errorMessage() }}</p>
    }

    <div class="add-euro__actions">
      <app-button
        [label]="literals.addButton"
        [loading]="loading()"
        [disabled]="!isValid()"
        (clicked)="onSubmit()"
      />
    </div>
  </div>
</div>
