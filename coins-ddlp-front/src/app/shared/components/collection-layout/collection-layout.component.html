<div class="collection-content" [style.max-width]="maxWidth">
  <div class="collection-header">
    @if (backLink) {
      <div class="collection-header__back-row">
        <app-button [label]="'← ' + backLabel" variant="tertiary" (clicked)="onBack()" />
        <div class="collection-header__title-row">
          @if (country) { <app-country-flag [country]="country" [size]="64" /> }
          <h1 class="collection-header__title">{{ title }}</h1>
        </div>
      </div>
    } @else {
      <h1 class="collection-header__title">{{ title }}</h1>
    }
    @if (searchPlaceholder) {
      <div class="collection-header__search-row">
        <app-search-input
          [placeholder]="searchPlaceholder"
          [value]="searchValue"
          (valueChange)="onSearch($event)"
        />
        <ng-content select="[layout-actions]" />
      </div>
    }
  </div>

  <div class="collection-card" [style.background]="cardBackground" [style.opacity]="cardOpacity">
    <ng-content />
  </div>
</div>
