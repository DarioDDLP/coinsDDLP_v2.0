<p-dialog
  [visible]="visible()"
  (onHide)="onHide()"
  [modal]="true"
  [header]="literals.recoveryTitle"
  [style]="{ width: '380px' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
>
  <div class="recovery-form">
    <app-text-input
      [label]="literals.newPasswordLabel"
      [value]="newPassword()"
      type="password"
      [placeholder]="literals.newPasswordPlaceholder"
      autocomplete="new-password"
      (valueChange)="newPassword.set($event)"
    />

    <app-text-input
      [label]="literals.confirmPasswordLabel"
      [value]="confirmPassword()"
      type="password"
      [placeholder]="literals.confirmPasswordPlaceholder"
      autocomplete="new-password"
      (valueChange)="confirmPassword.set($event)"
      (enterPressed)="onSubmit()"
    />

    @if (errorMessage()) {
      <p class="recovery-form__error">{{ errorMessage() }}</p>
    }

    <div class="recovery-form__actions">
      <app-button
        [label]="literals.recoveryButton"
        [loading]="loading()"
        [disabled]="!newPassword() || !confirmPassword()"
        (clicked)="onSubmit()"
      />
    </div>
  </div>
</p-dialog>
