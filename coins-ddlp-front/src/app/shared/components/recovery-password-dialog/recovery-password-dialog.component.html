<p-dialog
  [visible]="visible()"
  (onHide)="onHide()"
  [modal]="true"
  [header]="literals.recoveryTitle"
  [style]="{ width: '380px' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
>
  <div class="recovery-form">
    <div class="recovery-form__field">
      <label class="recovery-form__label">{{ literals.newPasswordLabel }}</label>
      <input
        pInputText
        type="password"
        [value]="newPassword()"
        (input)="newPassword.set($any($event.target).value)"
        [placeholder]="literals.newPasswordPlaceholder"
        autocomplete="new-password"
        class="recovery-form__input"
      />
    </div>

    <div class="recovery-form__field">
      <label class="recovery-form__label">{{ literals.confirmPasswordLabel }}</label>
      <input
        pInputText
        type="password"
        [value]="confirmPassword()"
        (input)="confirmPassword.set($any($event.target).value)"
        [placeholder]="literals.confirmPasswordPlaceholder"
        autocomplete="new-password"
        class="recovery-form__input"
        (keydown.enter)="onSubmit()"
      />
    </div>

    @if (errorMessage()) {
      <p class="recovery-form__error">{{ errorMessage() }}</p>
    }

    <div class="recovery-form__actions">
      <app-button
        [label]="literals.recoveryButton"
        [loading]="loading()"
        [disabled]="!newPassword() || !confirmPassword()"
        (clicked)="onSubmit()"
      />
    </div>
  </div>
</p-dialog>
