<p-dialog
  [visible]="visible()"
  (onHide)="onHide()"
  [modal]="true"
  [header]="header()"
  [style]="{ width: '380px' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
>
  @if (view() === 'logout') {
    <div class="login-form">
      <p class="login-form__confirm-message">{{ literals.logoutConfirm }}</p>
      <div class="login-form__actions login-form__actions--spread">
        <app-button
          [label]="sharedLiterals.cancel"
          variant="primary"
          (clicked)="onHide()"
        />
        <app-button
          [label]="sharedLiterals.confirm"
          variant="danger"
          (clicked)="onConfirmLogout()"
        />
      </div>
    </div>
  } @else if (view() === 'forgot') {
    <div class="login-form">
      @if (resetSent()) {
        <p class="login-form__confirm-message">{{ literals.resetSent }}</p>
        <div class="login-form__actions">
          <app-button
            [label]="literals.backToLogin"
            variant="secondary"
            (clicked)="view.set('login')"
          />
        </div>
      } @else {
        <app-text-input
          [label]="literals.emailLabel"
          [value]="email()"
          type="email"
          [placeholder]="literals.emailPlaceholder"
          autocomplete="email"
          (valueChange)="email.set($event)"
        />

        @if (errorMessage()) {
          <p class="login-form__error">{{ errorMessage() }}</p>
        }

        <div class="login-form__actions login-form__actions--spread">
          <app-button
            [label]="literals.backToLogin"
            variant="secondary"
            (clicked)="view.set('login')"
          />
          <app-button
            [label]="literals.resetButton"
            [loading]="loading()"
            [disabled]="!email()"
            (clicked)="onResetPassword()"
          />
        </div>
      }
    </div>
  } @else {
    <div class="login-form">
      <app-text-input
        [label]="literals.emailLabel"
        [value]="email()"
        type="email"
        [placeholder]="literals.emailPlaceholder"
        autocomplete="email"
        (valueChange)="email.set($event)"
      />

      <app-text-input
        [label]="literals.passwordLabel"
        [value]="password()"
        type="password"
        [placeholder]="literals.passwordPlaceholder"
        autocomplete="current-password"
        (valueChange)="password.set($event)"
        (enterPressed)="onSubmit()"
      />

      @if (errorMessage()) {
        <p class="login-form__error">{{ errorMessage() }}</p>
      }

      <div class="login-form__actions login-form__actions--forgot">
        <button class="login-form__forgot-link" type="button" (click)="view.set('forgot')">
          {{ literals.forgotPassword }}
        </button>
        <app-button
          [label]="literals.loginButton"
          [loading]="loading()"
          [disabled]="!email() || !password()"
          (clicked)="onSubmit()"
        />
      </div>
    </div>
  }
</p-dialog>
