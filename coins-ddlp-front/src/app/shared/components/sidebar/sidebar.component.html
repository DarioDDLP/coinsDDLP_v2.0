<nav class="sidebar">
  <div class="sidebar__logo">
    <img src="assets/logo-ddlp-dark.png" [attr.alt]="literals.logoAlt" />
  </div>

  <div class="sidebar__divider"></div>
  <p class="sidebar__section-label">{{ literals.sectionLabel }}</p>

  <ul class="sidebar__nav">
    @for (item of items; track item.routerLink) {
      <li>
        <a
          [routerLink]="item.routerLink"
          routerLinkActive="sidebar__nav-item--active"
          class="sidebar__nav-item"
        >
          <div class="sidebar__nav-icon">
            @if (item.country) {
              <app-country-flag [country]="item.country" [size]="30" />
            } @else if (item.imgUrl) {
              <img [src]="item.imgUrl" [alt]="item.label" />
            } @else {
              <i [class]="item.icon"></i>
            }
          </div>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  <div class="sidebar__footer">
    @if (numistaService.remaining() !== null) {
      <div class="sidebar__numista">
        <span class="sidebar__numista-label">{{ literals.numistaRemaining }}</span>
        <span class="sidebar__numista-count">{{ numistaService.remaining() }} / 2000</span>
      </div>
    }
    <app-button
      label="Iniciar sesión"
      icon="pi pi-sign-in"
      variant="ghost"
    />
  </div>
</nav>
